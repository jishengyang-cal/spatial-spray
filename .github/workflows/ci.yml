name: spatial-spray-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  linux-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Compliance and type/build checks
        run: pnpm workflow:check

      - name: API e2e
        run: pnpm test:api

      - name: Web simulator e2e
        run: pnpm test:e2e

      - name: Mac Builder boundary check
        run: pnpm native:mac-builder:check
